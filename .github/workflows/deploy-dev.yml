name: Deploy — Development

on:
  push:
    branches:
      - develop
  workflow_dispatch:          # allow manual trigger from GitHub UI

concurrency:
  group: deploy-dev
  cancel-in-progress: true   # cancel older runs if a new push arrives

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    environment: development  # links to GitHub Environment "development" and its secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate config.js from GitHub Environment secrets.
      # This replaces the gitignored config.js with environment-specific credentials.
      - name: Generate config.js
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ALLOWED_DOMAINS: ${{ vars.SUPABASE_ALLOWED_DOMAINS }}   # e.g. "" or "company.com"
          ENV_DISPLAY_NAME: ${{ vars.ENV_DISPLAY_NAME }}                   # e.g. "Development"
        run: |
          DOMAINS_JSON="[]"
          if [ -n "$SUPABASE_ALLOWED_DOMAINS" ]; then
            # Convert comma-separated list to JSON array
            DOMAINS_JSON=$(echo "$SUPABASE_ALLOWED_DOMAINS" | \
              python3 -c "import sys,json; raw=sys.stdin.read().strip(); print(json.dumps([d.strip() for d in raw.split(',') if d.strip()]))")
          fi

          cat > config.js <<EOF
          // Auto-generated by CI — do not edit manually.
          window.CHAT_VIEW_CONFIG = {
            environments: [
              {
                name: "${ENV_DISPLAY_NAME:-Development}",
                projectId: "${SUPABASE_PROJECT_ID}",
                anonKey: "${SUPABASE_ANON_KEY}",
                allowedDomains: ${DOMAINS_JSON},
              },
            ],
          };
          EOF

      # Bump the cache-busting version so browsers always fetch fresh JS.
      # Replaces ?v=<N> with the short git SHA in index.html.
      - name: Bump cache-busting version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s|app\.js?v=[^\"']*|app.js?v=${SHORT_SHA}|g" index.html

      # ---------------------------------------------------------------
