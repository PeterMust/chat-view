name: Deploy — Production

on:
  push:
    branches:
      - main
  workflow_dispatch:          # allow manual trigger from GitHub UI

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # never cancel in-flight prod deployments

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production   # links to GitHub Environment "production" and its secrets
                              # The "production" environment has required-reviewers protection,
                              # so this job will pause and wait for approval before running.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate config.js from GitHub Environment secrets.
      - name: Generate config.js
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ALLOWED_DOMAINS: ${{ vars.SUPABASE_ALLOWED_DOMAINS }}   # e.g. "yourcompany.com"
          ENV_DISPLAY_NAME: ${{ vars.ENV_DISPLAY_NAME }}                   # e.g. "Production"
        run: |
          DOMAINS_JSON="[]"
          if [ -n "$SUPABASE_ALLOWED_DOMAINS" ]; then
            DOMAINS_JSON=$(echo "$SUPABASE_ALLOWED_DOMAINS" | \
              python3 -c "import sys,json; raw=sys.stdin.read().strip(); print(json.dumps([d.strip() for d in raw.split(',') if d.strip()]))")
          fi

          cat > config.js <<EOF
          // Auto-generated by CI — do not edit manually.
          window.CHAT_VIEW_CONFIG = {
            environments: [
              {
                name: "${ENV_DISPLAY_NAME:-Production}",
                projectId: "${SUPABASE_PROJECT_ID}",
                anonKey: "${SUPABASE_ANON_KEY}",
                allowedDomains: ${DOMAINS_JSON},
              },
            ],
          };
          EOF

      # Bump the cache-busting version so browsers always fetch fresh JS.
      - name: Bump cache-busting version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s|app\.js?v=[^\"']*|app.js?v=${SHORT_SHA}|g" index.html

      # ---------------------------------------------------------------
